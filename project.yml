name: AgentStats
options:
  bundleIdPrefix: com.agentstats
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  AgentStats:
    type: application
    platform: macOS
    sources:
      - path: AgentStats
    settings:
      base:
        INFOPLIST_KEY_LSUIElement: true
        PRODUCT_BUNDLE_IDENTIFIER: com.agentstats.app
        PRODUCT_NAME: AgentStats
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: AgentStats
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        SWIFT_EMIT_LOC_STRINGS: true
    entitlements:
      path: AgentStats/AgentStats.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.network.server: false
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.agentstats.app"

  AgentStatsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AgentStatsTests
    dependencies:
      - target: AgentStats
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentstats.tests
        GENERATE_INFOPLIST_FILE: true
